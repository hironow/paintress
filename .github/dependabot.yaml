# Dependabot version updates -- hironow house style (firepact / tablecodec /
# dotfiles). 7-day cooldown holds routine bumps until a version has been public a
# week (supply-chain hardening); security updates bypass it. Each ecosystem is
# grouped into a single PR so a week's bumps land together.
#
# Ecosystems in this repo:
#   gomod          -> go.mod (/)
#   github-actions -> .github/workflows/*.yaml
version: 2
updates:
  - package-ecosystem: "gomod"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels: ["dependencies", "gomod"]
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      gomod:
        patterns: ["*"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    cooldown:
      default-days: 7
    labels: ["dependencies", "github-actions"]
    commit-message:
      prefix: "ci"
    groups:
      github-actions:
        patterns: ["*"]
