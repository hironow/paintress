rules:
  # ==========================================================================
  # Layer dependency direction enforcement
  # 依存方向: cmd → session → eventsource → root (逆方向禁止)
  #
  # paintress は 3 層構造:
  #   internal/cmd          — cobra CLI (top layer)
  #   internal/session      — I/O orchestration (filesystem, network, subprocess)
  #   internal/eventsource  — event store infrastructure (JSONL append-only)
  #   paintress (root)      — types, constants, pure functions, go:embed
  #
  # Ref: docs/adr/0014-event-sourcing.md
  #      docs/adr/0013-root-package-layer-separation.md
  #      phonewave docs/adr/S0005-root-infrastructure-and-layer-conventions.md
  # ==========================================================================

  # --- Rule 1: Root package must not import internal/ ---

  - id: layer-root-no-import-internal
    languages: [go]
    message: |
      root パッケージから internal/ への import は禁止です。
      依存方向: cmd → session → root（逆方向不可）
      root は types, constants, pure functions, go:embed のみ。
      I/O が必要な場合は internal/session/ に実装してください。
      Ref: docs/adr/0013-root-package-layer-separation.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/.*"
    paths:
      include:
        - "*.go"
      exclude:
        - "/internal/**"
        - "/cmd/**"

  # --- Rule 2: Session must not import cmd ---

  - id: layer-session-no-import-cmd
    languages: [go]
    message: |
      session 層から cmd 層への import は禁止です。
      依存方向: cmd → session → eventsource → root（逆方向不可）
      session は eventsource, root を import できます。
      Ref: docs/adr/0014-event-sourcing.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/cmd"
    paths:
      include:
        - "/internal/session/**"

  # --- Rule 3: Eventsource must not import session or cmd ---

  - id: layer-eventsource-no-import-session
    languages: [go]
    message: |
      eventsource 層から session 層または cmd 層への import は禁止です。
      依存方向: cmd → session → eventsource → root（逆方向不可）
      eventsource は root のみ import できます。
      Ref: docs/adr/0014-event-sourcing.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/(session|cmd)"
    paths:
      include:
        - "/internal/eventsource/**"

  # --- Rule 4: cmd must not import eventsource (ADR S0008) ---

  - id: s0008-cmd-no-import-eventsource
    languages: [go]
    message: |
      cmd 層から eventsource 層への直接 import は禁止です。
      session 層のファクトリ関数を経由してください。
      依存方向: cmd → session → eventsource（cmd → eventsource は禁止）
      Ref: phonewave docs/adr/S0008-cmd-eventsource-import-prohibition.md
    severity: ERROR
    patterns:
      - pattern-either:
          - pattern: |
              import "$PKG"
          - pattern: |
              import $_ALIAS "$PKG"
      - metavariable-regex:
          metavariable: $PKG
          regex: ".*/internal/eventsource"
    paths:
      include:
        - "/internal/cmd/**"
