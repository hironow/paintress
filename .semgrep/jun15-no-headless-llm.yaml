# jun15 MCP pivot: forbid headless LLM invocation paths.
#
# Source of truth: refs/HTMLification/docs/issues/0027-jun15-mcp-pivot.html §6
# (canonical, repo-wide scan in production paths only).
#
# Path strategy (v4):
# - Executable paths (justfile / scripts/** / *.sh / production Go) = ERROR
# - Test fixtures and archives = excluded (allowlist)
# - Active docs / markdown = out of scope (mention is allowed)
#
# Phase 1 MVP transitional excludes: NONE (all removed in sub-B commit).
# - internal/session/expedition.go: previously listed because Run() called
#   `claude -p` via exec.Command. Run() was rewritten to return
#   ErrMCPPivotDeprecated in commit 8249449 (sub-A) and the matching
#   exclude was removed in sub-B once `just semgrep` proved 0 finding
#   without it. Future production code attempting any `claude -p` /
#   Anthropic SDK / ANTHROPIC_API_KEY path will block at this gate.

rules:
  - id: jun15-no-claude-print-exec-go
    message: |
      `claude -p` / `--print` exec is forbidden (refs/issues/0027 MCP pivot).
      Route inference through the human-initiated claude code session via
      MCP server tools instead.
    severity: ERROR
    languages: [go]
    patterns:
      - pattern-either:
          - pattern: exec.Command("claude", "-p", ...)
          - pattern: exec.CommandContext(..., "claude", "-p", ...)
          - pattern: exec.Command("claude", "--print", ...)
          - pattern: exec.CommandContext(..., "claude", "--print", ...)
    paths:
      exclude:
        # Test fixtures that intentionally invoke a fake claude binary.
        - tests/**

  - id: jun15-no-anthropic-sdk-import-go
    message: |
      Anthropic Agent SDK import is forbidden post 6/15 MCP pivot.
      Use the claude code session's MCP transport instead.
    severity: ERROR
    languages: [go]
    pattern: import "github.com/anthropics/anthropic-sdk-go"
    paths:
      exclude:
        - tests/**

  - id: jun15-no-anthropic-api-key-read
    message: |
      ANTHROPIC_API_KEY env read is forbidden post 6/15 MCP pivot.
      Subscription-only billing path means the Go CLI does not need a
      direct API key; the human-initiated claude code session owns auth.
    severity: ERROR
    languages: [go]
    pattern: os.Getenv("ANTHROPIC_API_KEY")
    paths:
      exclude:
        - tests/**

  - id: jun15-no-claude-print-shell-wrapper
    message: |
      `claude -p` / `--print` via shell wrapper (bash -lc / sh -c) is
      forbidden. The shell hop hides the headless invocation from the
      Go AST scan above.
    severity: ERROR
    languages: [go]
    pattern-regex: 'exec\.Command(Context)?\([^)]*?(bash|sh|zsh)[^)]*?-[lc]+[^)]*?claude[^)]*?--?(p|print)\b'
    paths:
      exclude:
        - tests/**

  - id: jun15-no-claude-print-literal-executable
    message: |
      `claude -p` / `--print` literal in an executable path is forbidden.
      Scoped to justfile / scripts/** / *.sh / hooks config so docs that
      reference the flag in prose are not affected.
    severity: ERROR
    languages: [generic]
    pattern-regex: '\bclaude\s+(-p|--print)\b'
    paths:
      include:
        - "justfile"
        - "scripts/**"
        - "*.sh"
        - "*.bash"
        - "*.zsh"
        - "hooks.yaml"
        - ".claude/hooks/**"
      exclude:
        - "**/tests/**"
        - "**/docs/**"

  # refs/HTMLification/docs/issues/0028 §4.1: catch dynamic args spread.
  # The 0027 rule jun15-no-claude-print-exec-go only catches `exec.Command`
  # whose first arg is literal "claude" AND whose second arg is literal
  # "--print" / "-p". Production paths that build args as a []string slice
  # (or with append) and then spread it into exec.Command(claudeCmd, args...)
  # slip through. This rule forbids any "--print" literal in production Go
  # under internal/ and cmd/, regardless of how it flows into exec.Command.
  - id: jun15-no-print-flag-literal-go
    message: |
      `"--print"` string literal in production Go is forbidden post jun15
      MCP pivot (refs/issues/0027, 0028). Even when the binary path is
      config-driven (e.g., `a.ClaudeCmd`), a `"--print"` literal flowing
      into an exec.Command args slice indicates a headless LLM invocation
      path. Route inference through a human-initiated claude code session
      attached to this tool's MCP server.
    severity: ERROR
    languages: [go]
    pattern-regex: '"--print"'
    paths:
      include:
        - "internal/**/*.go"
        - "cmd/**/*.go"
        - "main.go"
      exclude:
        - "**/*_test.go"
        - "tests/**"
        - ".semgrep/**"
