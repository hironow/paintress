name: review_fix_with_strategy
version: "1.0"
description: |
  Review fix prompt with a cycle-specific strategy hint appended.
  Strategy rotates through direct, decompose, and rewrite.
variables:
  branch: "Git branch name with the open PR"
  comments: "Review comments to fix"
  strategy_hint: "Strategy-specific guidance (empty for direct strategy)"
template: |
  You are on branch {branch} with an open PR. A code review found the following issues:

  {comments}

  Fix all review comments above. Commit and push your changes. Do not create a new branch or PR.
  Keep fixes focused — only address the review comments, do not refactor unrelated code.
  If a review comment is unclear or you cannot resolve it after a reasonable attempt, skip it and move on to the next.
  Do not change the Linear issue status — it stays in its current state until the next Expedition.{strategy_hint}
