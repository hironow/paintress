name: mission_ja_wave
version: "1.0"
description: |
  Mission rules of engagement for Japanese, wave mode.
  Pre-rendered variant with wave-specific instructions (no Linear references).
variables: {}
template: |
  # Mission — 行動規範

  このファイルは Expedition の行動規範を定義する。
  全ての Expeditioner はこのファイルを読み、使命を遂行する。

  ---

  ## 使命の取得

  1. 対象の issue は Wave specification で提供される — 自分で issue を検索しないこと
  2. **Gradient Gauge** が提供されている場合は、どの程度の複雑さに挑戦するかの目安にする

  ## 使命の判定

  issue の内容と受信箱の D-Mail を分析し、以下の4つの型のいずれかに分類する：

  ### implement（実装）

  コード実装、機能追加、リファクタリング等。

  ### verify（検証）

  E2Eテスト、UI確認、チェックリスト消化、動作検証等。
  判定基準: description に「テスト」「確認」「検証」「チェック」「QA」「E2E」
  等のキーワードがある、またはチェックリスト（`- [ ]`）が含まれる。

  ### fix（修正）

  verify 中に不具合が見つかった場合、同じ Expedition 内で fix に遷移する。独立した選択肢ではなく、verify の結果から自然に続く。

  ### consolidate（統合）

  スタックされた PR チェインを単一の PR にまとめる。impl-feedback D-Mail が PR チェインの収束問題を指摘しており、着手可能な issue がない場合に選択する。

  ---

  ## implement の手順

  1. `git checkout <base-branch> && git pull origin <base-branch>`
  2. ブランチ作成: `feat/<step-id>-<短い説明>`（step ID中の `:` は `-` に置換すること。例: `auth-w1:s1` → `auth-w1-s1`）
  4. TDD: テストを書く -> 実装する -> テストを通す
  5. こまめにコミット（コミットメッセージに issue ID を含める）
  6. lint / format チェック
  7. 3回修正しても通らない場合 -> スキップ（journal に教訓を残す）
  8. GitHub で PR 作成（ボディに実装したwave stepへの参照を記載）
  10. コードレビューは PR 作成後にオーケストレーター（Paintress）が処理する — 自分でレビューコマンドを実行しないこと

  ## verify の手順

  1. Dev server が起動済みであることを確認（URL にアクセスできるか）
  3. ブラウザ自動化ツール（Playwright, Chrome DevTools 等）が利用可能であれば、ブラウザを開き対象ページにアクセス
  4. チェックリスト項目を **1つずつ** 実行:
     a. UI を操作
     b. 期待結果と実際の結果を比較
     c. ブラウザ自動化が可能ならスクリーンショットを撮影
     d. 結果を記録（Pass / Fail + 詳細）
  5. QA レポートを作成し、expedition report（D-Mail）に結果を記載
  6. **不具合がない場合**: レポート内でステップ完了を記録
  7. **不具合がある場合**: -> fix に遷移

  ## fix の手順（verify から自動遷移）

  不具合ごとに:

  1. 不具合を expedition report（D-Mail）に記録する — GitHub issue は作成しないこと
  2. `git checkout <base-branch> && git pull origin <base-branch>`
  3. ブランチ: `fix/<step-id>-<短い説明>`
  4. 修正を実装しテストを書く
  5. 3回修正しても通らない場合 -> スキップ（journal に教訓を残す）
  6. GitHub で PR 作成（ボディに verify で発見した不具合への参照を記載）
  9. コードレビューは PR 作成後にオーケストレーター（Paintress）が処理する — 自分でレビューコマンドを実行しないこと

  ## consolidate の手順

  受信箱に PR チェインの収束問題（スタック PR、behind-by カウント、コンフリクト）を記述する impl-feedback D-Mail があり、かつ着手可能な issue がない場合に `consolidate` を選択し、チェインを単一の PR にまとめる。

  1. **チェイン解析**: impl-feedback D-Mail を読み、PR チェインの構造（PR 番号、依存順序、コンフリクト、behind-by）を把握する
  2. **ブランチ作成**: `git checkout -b consolidate/<PR番号リスト> <base-branch>` — PR 番号を降順に並べる（例: `consolidate/pr-35-34-33 main`）。リストが長い場合は最新の PR で切り詰めて良い。
  3. **ルートから順に変更を適用**: チェイン内の各 PR について、ルート（base branch に最も近い PR）から順に：
     - PR の変更を取得: `gh pr diff <PR番号> | git apply` またはコミットを cherry-pick
     - コンフリクト発生時: wave step の DoD と実装意図を参照して解決
     - 各 PR の変更適用後にコミット: `git commit -m "consolidate: apply <PR番号> (<issue-id>)"`
  4. **新 PR 作成**: `gh pr create --base <base-branch>` — **タイトル**と**ボディ**の両方に統合元の PR 番号を含めること（例: タイトル `consolidate: unify #33, #34, #35`）
  5. **旧 PR をクローズ**: 新 PR に変更が完全に含まれている各旧 PR について：
     - コメント: `#<新PR番号> に統合済み`
     - クローズ: `gh pr close <PR番号>`
  6. **レポート**: `mission_type: consolidate` で expedition report を出力

  ### consolidate の制約

  - **保護ブランチ**: main, master, develop, staging, dev, stg, prod, production を作業ブランチとして直接変更・チェックアウトしてはならない。新 PR の `--base` としてのみ使用する。
  - **マージ禁止**: 統合 PR は作成するが、マージはしない。通常のレビューフローに委ねる。
  - **包含確認後のみクローズ**: 旧 PR は変更が新 PR に完全に含まれている場合のみクローズする。
  - **ステップステータス不変**: wave step のステータスは変更しない。PR のリンクが変わるだけで、ステップはそのまま。
  - **部分完了**: タイムアウト前にチェイン全体を完了できない場合、reason フィールドに途中経過（適用済み PR、残り PR）を出力し、次の expedition が push 済みブランチから続行できるようにする。

  ---

  ## 禁止事項

  - force push しない
  - base branch に直接 commit しない
  - テストが通らない状態で PR を出さない
  - dev server を停止しない（外部プロセスで管理）
  - 同じ Expedition 内で fix の結果を再検証しない — 検証は次の Expedition に委ねる

  ## 曖昧さへの対処

  - 曖昧な項目は最善の判断で実行し、journal に判断理由を残す
  - 仕様不明確な issue はスキップし、journal に記録
  - 自信がない場合はスキップして次の Expedition に託す
