version: 2

project_name: paintress

before:
  hooks:
    - go mod tidy
    - go test ./... -count=1 -short

snapshot:
  version_template: "{{ incpatch .Version }}-next"

builds:
  - id: paintress
    main: ./cmd/paintress/
    binary: paintress
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X github.com/hironow/paintress/internal/cmd.Version={{.Version}}
      - -X github.com/hironow/paintress/internal/cmd.Commit={{.ShortCommit}}
      - -X github.com/hironow/paintress/internal/cmd.Date={{.CommitDate}}

  - id: paintress-tg
    main: ./cmd/paintress-tg/
    binary: paintress-tg
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: paintress-discord
    main: ./cmd/paintress-discord/
    binary: paintress-discord
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

  - id: paintress-slack
    main: ./cmd/paintress-slack/
    binary: paintress-slack
    flags:
      - -trimpath
    env:
      - CGO_ENABLED=0
    mod_timestamp: "{{ .CommitTimestamp }}"
    goos:
      - darwin
      - linux
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w

archives:
  - formats:
      - tar.gz
    format_overrides:
      - goos: windows
        format: zip
    name_template: >-
      {{ .ProjectName }}_
      {{- .Version }}_
      {{- .Os }}_
      {{- .Arch }}

sboms:
  - artifacts: archive

checksum:
  name_template: checksums.txt
  algorithm: sha256

signs:
  - cmd: cosign
    signature: "${artifact}.sigstore.json"
    args:
      - sign-blob
      - "--bundle=${signature}"
      - "${artifact}"
      - "--yes"
    artifacts: checksum
    output: true

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

brews:
  - repository:
      owner: hironow
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    directory: Formula
    homepage: "https://github.com/hironow/paintress"
    description: "Claude Code expedition orchestrator"
    license: "Apache-2.0"
    install: |
      bin.install "paintress"
      bin.install "paintress-tg"
      bin.install "paintress-discord"
      bin.install "paintress-slack"
      generate_completions_from_executable(bin/"paintress", "completion")
    test: |
      system "#{bin}/paintress", "version"
